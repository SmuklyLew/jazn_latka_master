name: apply-memory-rebuild-v240204

on:
  push:
    branches:
      - upgrade/memory_rebuild_v24.0.2.04
      - upgrade/memory_rebuild_v24.0.2.04_verified
      - upgrade/memory_rebuild_v24.0.2.04_apply
  pull_request:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: apply-memory-rebuild-v240204
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Verify and extract controlled payload
        shell: bash
        run: |
          set -euo pipefail
          payload_dir=".github/memory_rebuild_v240204_payload"
          cat "$payload_dir"/part01.b64 "$payload_dir"/part02.b64 "$payload_dir"/part03.b64 "$payload_dir"/part04.b64 > "$RUNNER_TEMP/payload.b64"
          base64 --decode "$RUNNER_TEMP/payload.b64" > "$RUNNER_TEMP/payload.tar.xz"
          echo "6788248448ebd8d168d9af525e3ed9a19e54510a31d793c244341991f0b15570  $RUNNER_TEMP/payload.tar.xz" | sha256sum --check --strict
          python -X utf8 - <<'PY'
          from pathlib import Path, PurePosixPath
          import io
          import lzma
          import tarfile

          root = Path.cwd().resolve()
          payload = Path(__import__('os').environ['RUNNER_TEMP']) / 'payload.tar.xz'
          expected = {
              'latka_jazn/tools/chat_export_models.py',
              'latka_jazn/tools/chat_export_reader.py',
              'latka_jazn/tools/chat_export_importer.py',
              'latka_jazn/tools/memory_rebuild_coordinator.py',
              'latka_jazn/tools/memory_restore_runner.py',
              'tools/memory_rebuild.py',
              'tests/test_v15101_chat_export_source_selection.py',
              'tests/test_memory_rebuild_v240204.py',
              'docs/tools/MEMORY_REBUILD.md',
              'docs/tools/MEMORY_RESTORE.md',
              'docs/tools/MEMORY_REBUILD_V24.0.2.04_AUDIT.md',
          }
          raw = lzma.decompress(payload.read_bytes())
          with tarfile.open(fileobj=io.BytesIO(raw), mode='r:') as archive:
              members = archive.getmembers()
              names = {member.name for member in members}
              if names != expected:
                  raise SystemExit(f'unexpected payload members: missing={sorted(expected-names)}, extra={sorted(names-expected)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts or member.issym() or member.islnk() or not member.isfile():
                      raise SystemExit(f'unsafe payload member: {member.name}')
                  target = (root / Path(*path.parts)).resolve()
                  target.relative_to(root)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  source = archive.extractfile(member)
                  if source is None:
                      raise SystemExit(f'cannot read payload member: {member.name}')
                  target.write_bytes(source.read())
                  target.chmod(0o755 if member.name == 'tools/memory_rebuild.py' else 0o644)
          print({'extracted_files': len(expected)})
          PY
          rm -f tools/restore_memory.py
          python -X utf8 - <<'PY'
          from pathlib import Path

          path = Path('latka_jazn/tools/memory_rebuild_coordinator.py')
          text = path.read_text(encoding='utf-8')
          old = """                    if not continue_on_error:
                        break
"""
          new = """                    if not continue_on_error:
                        raise
"""
          if text.count(old) != 1:
              raise SystemExit('expected exactly one fail-fast coordinator snippet')
          path.write_text(text.replace(old, new), encoding='utf-8')
          print({'coordinator_fail_fast_contract': 'restored'})
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Compile and run focused regressions
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee "$RUNNER_TEMP/apply-memory-rebuild-v240204.log") 2>&1
          python -X utf8 -m compileall -q \
            latka_jazn/tools/chat_export_models.py \
            latka_jazn/tools/chat_export_reader.py \
            latka_jazn/tools/chat_export_importer.py \
            latka_jazn/tools/memory_rebuild_coordinator.py \
            latka_jazn/tools/memory_restore_runner.py \
            tools/memory_rebuild.py \
            tests/test_v15101_chat_export_source_selection.py \
            tests/test_memory_rebuild_v240204.py
          python -X utf8 tools/memory_rebuild.py --version
          python -X utf8 tools/memory_rebuild.py --self-test
          python -X utf8 -m pytest -q -ra --tb=short \
            tests/test_v15101_chat_export_pipeline.py \
            tests/test_v15101_chat_export_source_selection.py \
            tests/test_memory_rebuild_v240204.py \
            tests/test_memory_rebuild_tool.py \
            tests/test_memory_restore_tool.py

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-memory-rebuild-v240204-diagnostics
          path: ${{ runner.temp }}/apply-memory-rebuild-v240204.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified upgrade
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/memory_rebuild_v240204_payload
          git rm .github/workflows/apply-memory-rebuild-v240204.yml
          rm -f .archives/apply-memory-rebuild-v240204.trigger
          git add -A
          git diff --cached --check
          git commit -m "feat(memory): upgrade rebuild workflow to v24.0.2.04"
          git push origin "HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
