name: cursor-windows-conpty

on:
  push:
    branches:
      - tools/memory-import-to-db
  pull_request:
    branches:
      - master
    paths:
      - "latka_jazn/tools/chat_export_ui.py"
      - "tools/memory_import_ui.py"
      - "tools/windows_cursor_conpty_smoke.py"
      - ".github/workflows/cursor-windows-conpty.yml"

permissions:
  contents: read

concurrency:
  group: cursor-windows-conpty-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conpty-smoke:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
      - name: Install project and native ConPTY wrapper
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pywinpty
      - name: Run cursor UI in native Windows ConPTY
        shell: pwsh
        run: python -X utf8 tools/windows_cursor_conpty_smoke.py
