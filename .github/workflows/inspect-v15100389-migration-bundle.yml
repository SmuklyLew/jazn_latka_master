name: Inspect v15.1.0.3.89 migration bundle

on:
  push:
    branches:
      - automation/v15.1.0.3.89-migration-runner
    paths:
      - '.github/workflows/inspect-v15100389-migration-bundle.yml'
  pull_request:
    branches:
      - update/v15.1.0.3.89-current-line-archive
    paths:
      - '.github/workflows/inspect-v15100389-migration-bundle.yml'
      - '.automation/v15.1.0.3.89/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/v15.1.0.3.89-migration-runner

      - name: Reconstruct and inspect bundle
        shell: bash
        run: |
          set -euo pipefail
          parts=(.automation/v15.1.0.3.89/bundle/part-*.b64)
          test -e "${parts[0]}"
          printf 'bundle_parts=%s\n' "${#parts[@]}"
          cat "${parts[@]}" | base64 --decode > migration.bundle.xz
          printf 'bundle_xz_sha256=%s\n' "$(sha256sum migration.bundle.xz | awk '{print $1}')"
          xz --test migration.bundle.xz
          xz --decompress --stdout migration.bundle.xz > migration.bundle
          printf 'bundle_sha256=%s\n' "$(sha256sum migration.bundle | awk '{print $1}')"

          git fetch origin master update/v15.1.0.3.89-current-line-archive
          master_commit="$(git rev-parse origin/master)"
          master_tree="$(git rev-parse origin/master^{tree})"
          update_commit="$(git rev-parse origin/update/v15.1.0.3.89-current-line-archive)"
          update_tree="$(git rev-parse origin/update/v15.1.0.3.89-current-line-archive^{tree})"

          git bundle verify migration.bundle
          git fetch migration.bundle 'refs/heads/*:refs/remotes/migration/*'
          bundle_ref="$(git for-each-ref --format='%(refname)' refs/remotes/migration | head -n 1)"
          test -n "$bundle_ref"
          bundle_commit="$(git rev-parse "$bundle_ref")"
          bundle_tree="$(git rev-parse "$bundle_commit^{tree}")"
          bundle_root="$(git rev-list --max-parents=0 "$bundle_commit" | head -n 1)"
          bundle_root_tree="$(git rev-parse "$bundle_root^{tree}")"

          printf 'master_commit=%s\n' "$master_commit"
          printf 'master_tree=%s\n' "$master_tree"
          printf 'update_commit=%s\n' "$update_commit"
          printf 'update_tree=%s\n' "$update_tree"
          printf 'bundle_ref=%s\n' "$bundle_ref"
          printf 'bundle_commit=%s\n' "$bundle_commit"
          printf 'bundle_tree=%s\n' "$bundle_tree"
          printf 'bundle_root=%s\n' "$bundle_root"
          printf 'bundle_root_tree=%s\n' "$bundle_root_tree"
          printf 'previous_expected_tree=%s\n' '951431615fe47aeeac96a330d177916173d37542'
          printf 'inspection=complete\n'
