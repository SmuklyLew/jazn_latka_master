name: Inspect v15.1.0.3.89 migration bundle

on:
  push:
    branches:
      - automation/v15.1.0.3.89-migration-runner
    paths:
      - '.github/workflows/inspect-v15100389-migration-bundle.yml'
  pull_request:
    branches:
      - update/v15.1.0.3.89-current-line-archive
    paths:
      - '.github/workflows/inspect-v15100389-migration-bundle.yml'
      - '.automation/v15.1.0.3.89/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/v15.1.0.3.89-migration-runner

      - name: Inspect exact raw candidates
        shell: bash
        run: |
          set -u
          candidates=(.automation/v15.1.0.3.89/raw/candidate-*.bin)
          test -e "${candidates[0]}"
          for candidate in "${candidates[@]}"; do
            echo "=== $candidate ==="
            wc -c "$candidate"
            sha256sum "$candidate"
            file "$candidate" || true

            xz --test "$candidate"
            xz_rc=$?
            echo "xz_test_rc=$xz_rc"
            if [ "$xz_rc" -eq 0 ]; then
              xz --decompress --stdout "$candidate" > candidate.bundle
              echo "decompressed_bytes=$(wc -c < candidate.bundle)"
              echo "decompressed_sha256=$(sha256sum candidate.bundle | awk '{print $1}')"
              git bundle verify candidate.bundle
              bundle_rc=$?
              echo "bundle_verify_rc=$bundle_rc"
              if [ "$bundle_rc" -eq 0 ]; then
                rm -rf refs/remotes/migration
                git fetch candidate.bundle 'refs/heads/*:refs/remotes/migration/*'
                git for-each-ref --format='%(refname) %(objectname)' refs/remotes/migration
                for ref in $(git for-each-ref --format='%(refname)' refs/remotes/migration); do
                  echo "ref=$ref commit=$(git rev-parse "$ref") tree=$(git rev-parse "$ref^{tree}")"
                done
              fi
            fi
          done
          echo inspection_complete
