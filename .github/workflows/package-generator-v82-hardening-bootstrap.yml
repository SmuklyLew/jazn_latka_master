name: Package generator v8.2 hardening bootstrap

on:
  push:
    branches:
      - fix/package-generator-v82-hardening

permissions:
  contents: write

jobs:
  harden-generator:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/package-generator-v82-hardening

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest prompt_toolkit

      - name: Apply exact generator hardening and tests
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          from pathlib import Path

          generator_path = Path("tools/jazn_pack_generator.py")
          text = generator_path.read_text(encoding="utf-8")

          replacements = [
              (
                  r'''Przykłady:
  py _jazn_pack_generator.py
  py _jazn_pack_generator.py pack D:\\.AI\\jazn_latka_master --out D:\\.AI\\.packages --profile dual
  py _jazn_pack_generator.py verify D:\\.AI\\.packages\\jazn_latka_vX_system.zip.package.json
  py _jazn_pack_generator.py extract D:\\.AI\\.packages\\jazn_latka_vX_system.zip.package.json D:\\.AI\\runtime_test
''',
                  r'''Przykłady:
  py -X utf8 .\\tools\\jazn_pack_generator.py
  py -X utf8 .\\tools\\jazn_pack_generator.py pack D:\\.AI\\jazn_latka_master --out D:\\.AI\\.packages --profile dual
  py -X utf8 .\\tools\\jazn_pack_generator.py verify D:\\.AI\\.packages\\jazn_latka_vX_system.zip.package.json
  py -X utf8 .\\tools\\jazn_pack_generator.py extract D:\\.AI\\.packages\\jazn_latka_vX_system.zip.package.json D:\\.AI\\runtime_test
''',
              ),
              (
                  '''REQUIRED_SYSTEM_PATHS = {
    "SOURCE_PROVENANCE.json",
    "run.py",
    "main.py",
    "latka_jazn/version.py",
}
''',
                  '''# Kanoniczna paczka systemowa jest samowystarczalnym wydaniem repozytorium.
# Wymaga zarówno operatorskiego run.py, jak i technicznego punktu zgodności
# main.py; zasada runtime „run.py albo main.py” dotyczy odkrywania kandydatów,
# nie budowania kompletnego wydania systemowego.
REQUIRED_SYSTEM_PATHS = {
    "SOURCE_PROVENANCE.json",
    "run.py",
    "main.py",
    "latka_jazn/version.py",
}
''',
              ),
              (
                  'root = argparse.ArgumentParser(description="Jaźń / Łatka — kanoniczny generator paczek ZIP v8.2")',
                  '''root = argparse.ArgumentParser(
        description="Jaźń / Łatka — kanoniczny generator paczek ZIP v8.2",
        allow_abbrev=False,
    )''',
              ),
              (
                  'pack = sub.add_parser("pack", help="Zbuduj i zweryfikuj paczkę")',
                  'pack = sub.add_parser("pack", allow_abbrev=False, help="Zbuduj i zweryfikuj paczkę")',
              ),
              (
                  'plan = sub.add_parser("plan", help="Pokaż kanoniczny plan bez pakowania")',
                  'plan = sub.add_parser("plan", allow_abbrev=False, help="Pokaż kanoniczny plan bez pakowania")',
              ),
              (
                  'verify = sub.add_parser("verify", help="Zweryfikuj paczkę na podstawie *.package.json")',
                  'verify = sub.add_parser("verify", allow_abbrev=False, help="Zweryfikuj paczkę na podstawie *.package.json")',
              ),
              (
                  'extract = sub.add_parser("extract", help="Zweryfikuj i bezpiecznie rozpakuj paczkę")',
                  'extract = sub.add_parser("extract", allow_abbrev=False, help="Zweryfikuj i bezpiecznie rozpakuj paczkę")',
              ),
              (
                  'manifest = sub.add_parser("manifest", help="Zaktualizuj PACKAGE_INTEGRITY_MANIFEST.json")',
                  'manifest = sub.add_parser("manifest", allow_abbrev=False, help="Zaktualizuj PACKAGE_INTEGRITY_MANIFEST.json")',
              ),
              (
                  'sub.add_parser("self-test", help="Test wersji, ZIP independent/binary i zgodności archiwizatorów")',
                  '''sub.add_parser(
        "self-test",
        allow_abbrev=False,
        help="Test wersji, ZIP independent/binary i zgodności archiwizatorów",
    )''',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected exactly one generator replacement, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          generator_path.write_text(text, encoding="utf-8")

          contract_b64 = ""
          dashboard_b64 = ""

          Path("tests/test_jazn_pack_generator_v82_contract.py").write_bytes(base64.b64decode(contract_b64))
          Path("tests/test_jazn_pack_generator_v82_dashboard.py").write_bytes(base64.b64decode(dashboard_b64))
          PY

          rm -- .github/workflows/package-generator-v82-hardening-bootstrap.yml

      - name: Focused validation
        run: |
          python -X utf8 -m compileall -q latka_jazn tests main.py run.py tools/jazn_pack_generator.py
          python -X utf8 tools/jazn_pack_generator.py self-test
          python -X utf8 -m pytest -q \
            tests/test_package_generator_release_version.py \
            tests/test_package_integrity_zip_verification.py \
            tests/test_package_integrity_canonical_worktree.py \
            tests/test_jazn_pack_generator_v82_contract.py \
            tests/test_jazn_pack_generator_v82_dashboard.py
          git diff --check

      - name: Commit generator and tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(pack): harden v8.2 generator contracts"

      - name: Synchronize canonical release metadata
        run: |
          python -X utf8 -m latka_jazn.tools.release_metadata_sync \
            --root . \
            --base-branch master \
            --write \
            --json
          git add PACKAGE_INTEGRITY_MANIFEST.json SOURCE_PROVENANCE.json
          if ! git diff --cached --quiet; then
            git commit -m "release: synchronize canonical metadata for package generator hardening"
          fi

      - name: Full validation
        run: |
          python -X utf8 -m pytest -q -m "not live_model and not live_mcp"
          python -X utf8 run.py doctor --json
          python -X utf8 run.py package-smoke --profile system --json
          git diff --check HEAD~2..HEAD
          test -z "$(git status --porcelain)"

      - name: Push final branch
        run: git push origin HEAD:fix/package-generator-v82-hardening
