name: release-hardening

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: release-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manifest_sync:
    if: ${{ github.ref == 'refs/heads/update/v15.1.0.1' || github.head_ref == 'update/v15.1.0.1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      head_sha: ${{ steps.head.outputs.sha }}
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: update/v15.1.0.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Build canonical manifest candidate
        run: |
          python -X utf8 - <<'PY'
          import os
          from pathlib import Path
          from latka_jazn.tools.package_integrity import (
              build_package_integrity_manifest,
              serialize_package_integrity_manifest,
          )

          output = Path(os.environ["RUNNER_TEMP"]) / "PACKAGE_INTEGRITY_MANIFEST.json"
          payload = build_package_integrity_manifest(Path.cwd())
          output.write_bytes(serialize_package_integrity_manifest(payload))
          print({"runtime_version": payload["runtime_version"], "file_count": payload["file_count"]})
          PY

      - name: Compare manifest semantics
        id: delta
        run: |
          python -X utf8 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          volatile = {"generated_at_utc", "updated_at_utc"}

          def normalized(path: Path):
              if not path.is_file():
                  return None
              payload = json.loads(path.read_text(encoding="utf-8-sig"))
              if not isinstance(payload, dict):
                  return None
              return {key: value for key, value in payload.items() if key not in volatile}

          current = normalized(Path("PACKAGE_INTEGRITY_MANIFEST.json"))
          candidate = normalized(Path(os.environ["RUNNER_TEMP"]) / "PACKAGE_INTEGRITY_MANIFEST.json")
          print(f"needs_update={'true' if current != candidate else 'false'}")
          PY

      - name: Commit synchronized manifest
        if: ${{ steps.delta.outputs.needs_update == 'true' }}
        run: |
          cp "$RUNNER_TEMP/PACKAGE_INTEGRITY_MANIFEST.json" PACKAGE_INTEGRITY_MANIFEST.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PACKAGE_INTEGRITY_MANIFEST.json
          git commit -m "release: rebuild PACKAGE_INTEGRITY_MANIFEST for v15.1.0.1"
          git push origin HEAD:update/v15.1.0.1

      - name: Resolve synchronized HEAD
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  verify:
    needs: manifest_sync
    if: ${{ always() && (needs.manifest_sync.result == 'success' || needs.manifest_sync.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ needs.manifest_sync.outputs.head_sha || github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Compile all active Python
        run: python -X utf8 -m compileall -q latka_jazn tests main.py run.py

      - name: Test without live/private integrations
        run: >-
          python -X utf8 -m pytest
          -q -ra --tb=short --durations=25
          -m "not live_model and not live_mcp"

      - name: Package smoke system profile
        run: python -X utf8 run.py package-smoke --profile system --json

      - name: Package smoke release profile
        run: python -X utf8 run.py package-smoke --profile release --json

      - name: Security path regressions
        run: python -X utf8 -m pytest -q tests/test_release_hardening_safe_paths.py tests/test_release_hardening_raw_archive.py

      - name: Full session integrity regressions
        run: python -X utf8 -m pytest -q tests/test_release_hardening_integrity_pipeline.py

      - name: Turn atomicity and timeout regressions
        run: >-
          python -X utf8 -m pytest -q
          tests/test_v15033_turn_atomicity.py
          tests/test_runtime_stability_daemon_status.py

      - name: Active contract legacy guard
        run: python -X utf8 -m pytest -q tests/test_release_hardening_active_contracts.py

      - name: Diff whitespace and generated-file guard
        if: ${{ always() }}
        run: |
          git diff --check
          git diff --exit-code

  finalization:
    needs: [manifest_sync, verify]
    if: ${{ needs.verify.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
      JAZN_NETWORK_TIME_FIRST: "0"
      JAZN_NETWORK_TIME_IN_TURN: "0"
      JAZN_ALLOW_NETWORK: "0"
      JAZN_DICTIONARY_ALLOW_NETWORK: "0"
      JAZN_MODEL_ADAPTER: "null"
      FINALIZATION_DIR: ${{ runner.temp }}/v151-release-finalization
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ needs.manifest_sync.outputs.head_sha || github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          mkdir -p "$FINALIZATION_DIR"

      - name: Verify committed package manifest
        run: |
          python -X utf8 - <<'PY'
          import json
          import os
          from pathlib import Path
          from latka_jazn.tools.package_integrity import verify_package_integrity_manifest

          report = verify_package_integrity_manifest(Path.cwd())
          (Path(os.environ["FINALIZATION_DIR"]) / "manifest-verification.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          raise SystemExit(0 if report.get("ok") else 2)
          PY

      - name: Create clean release staging
        run: |
          python -X utf8 - <<'PY'
          import json
          import os
          from pathlib import Path
          from latka_jazn.tools.release_staging import create_release_staging

          destination = Path(os.environ["RUNNER_TEMP"]) / "jazn-v15.1.0.1-release"
          report = create_release_staging(Path.cwd(), destination)
          (Path(os.environ["FINALIZATION_DIR"]) / "release-staging.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2, default=str) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False, indent=2, default=str))
          raise SystemExit(0 if report.get("ok") else 2)
          PY

      - name: Run doctor on verified release staging
        shell: bash
        run: |
          staging="$RUNNER_TEMP/jazn-v15.1.0.1-release"
          (
            cd "$staging"
            python -X utf8 run.py doctor --json
          ) > "$FINALIZATION_DIR/doctor.json"
          cat "$FINALIZATION_DIR/doctor.json"
          python -X utf8 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads((Path(os.environ["FINALIZATION_DIR"]) / "doctor.json").read_text(encoding="utf-8"))
          required = {
              "installation_ok": payload.get("installation_ok"),
              "activation_ready": payload.get("activation_ready"),
              "release_metadata_current": payload.get("release_metadata_current"),
              "release_ready": payload.get("release_ready"),
          }
          print(required)
          if not all(required.values()):
              raise SystemExit(f"release doctor failed: {required}")
          PY

      - name: Package smoke system profile
        run: python -X utf8 run.py package-smoke --profile system --json | tee "$FINALIZATION_DIR/package-smoke-system.json"

      - name: Package smoke release profile
        run: python -X utf8 run.py package-smoke --profile release --json | tee "$FINALIZATION_DIR/package-smoke-release.json"

      - name: Targeted full runtime turn
        run: python -X utf8 -m pytest -q tests/test_v15101_runtime_full_turn.py | tee "$FINALIZATION_DIR/full-turn.txt"

      - name: Version and manifest contract
        run: python -X utf8 -m pytest -q tests/test_single_source_version_manifest_contract.py | tee "$FINALIZATION_DIR/version-manifest-contract.txt"

      - name: Clean checkout guard
        run: |
          git diff --check
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Upload finalization reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: v151-release-finalization-reports
          path: ${{ env.FINALIZATION_DIR }}/
          retention-days: 14
