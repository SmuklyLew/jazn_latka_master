name: release-hardening

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: jazn-release-metadata-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  manifest_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      head_sha: ${{ steps.head.outputs.sha }}
      runtime_version: ${{ steps.version.outputs.full }}
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
      JAZN_RELEASE_BASE_BRANCH: master
      JAZN_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
    steps:
      - name: Checkout source branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Resolve runtime version
        id: version
        shell: bash
        run: |
          runtime_version="$(
            python -X utf8 -c \
              'from latka_jazn.version import PACKAGE_VERSION_FULL; print(PACKAGE_VERSION_FULL)'
          )"
          echo "full=${runtime_version}" >> "$GITHUB_OUTPUT"
          echo "Runtime version: ${runtime_version}"

      - name: Normalize origin URL for deterministic provenance
        shell: bash
        run: |
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git remote get-url origin

      - name: Synchronize canonical release metadata
        run: >-
          python -X utf8 -m latka_jazn.tools.release_metadata_sync
          --root .
          --base-branch master
          --write
          --json

      - name: Commit synchronized release metadata on allowed branches
        shell: bash
        run: |
          if git diff --quiet -- \
            SOURCE_PROVENANCE.json \
            PACKAGE_INTEGRITY_MANIFEST.json; then
            echo "Release metadata is already synchronized."
            exit 0
          fi

          target_branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          runtime_version="${{ steps.version.outputs.full }}"

          if [ "$target_branch" = "master" ]; then
            echo "Release metadata drift detected on master." >&2
            git diff --stat -- \
              SOURCE_PROVENANCE.json \
              PACKAGE_INTEGRITY_MANIFEST.json >&2
            exit 2
          fi

          if [ "$JAZN_HEAD_REPOSITORY" != "$GITHUB_REPOSITORY" ]; then
            echo "Release metadata drift cannot be committed to a fork: ${JAZN_HEAD_REPOSITORY}." >&2
            exit 2
          fi

          case "$target_branch" in
            update/*|tools/upgrade-*|hotfix/*|upgrade/*|fix/*)
              git config user.name "github-actions[bot]"
              git config user.email \
                "41898282+github-actions[bot]@users.noreply.github.com"
              git add \
                SOURCE_PROVENANCE.json \
                PACKAGE_INTEGRITY_MANIFEST.json
              git commit \
                -m "release: synchronize canonical metadata for ${runtime_version}"
              git push origin "HEAD:${target_branch}"
              ;;
            *)
              echo "Release metadata drift detected outside an allowed synchronization branch: ${target_branch}." >&2
              exit 2
              ;;
          esac

      - name: Verify synchronization is idempotent
        run: >-
          python -X utf8 -m latka_jazn.tools.release_metadata_sync
          --root .
          --base-branch master
          --check
          --json

      - name: Resolve synchronized HEAD
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  verify:
    needs: manifest_sync
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout synchronized source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ needs.manifest_sync.outputs.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Compile all active Python
        run: python -X utf8 -m compileall -q latka_jazn tests main.py run.py

      - name: Test without live/private integrations
        run: >-
          python -X utf8 -m pytest
          -q -ra --tb=short --durations=25
          --junitxml="${{ runner.temp }}/pytest-${{ matrix.os }}.xml"
          -m "not live_model and not live_mcp"

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-${{ matrix.os }}
          path: ${{ runner.temp }}/pytest-${{ matrix.os }}.xml
          retention-days: 7

      - name: Package smoke system profile
        run: python -X utf8 run.py package-smoke --profile system --json

      - name: Package smoke release profile
        shell: pwsh
        run: python -X utf8 tools/package_smoke_ci.py --profile release

      - name: Security path regressions
        run: python -X utf8 -m pytest -q tests/test_release_hardening_safe_paths.py tests/test_release_hardening_raw_archive.py

      - name: Full session integrity regressions
        run: python -X utf8 -m pytest -q tests/test_release_hardening_integrity_pipeline.py

      - name: Turn atomicity and timeout regressions
        run: >-
          python -X utf8 -m pytest -q
          tests/test_v15033_turn_atomicity.py
          tests/test_runtime_stability_daemon_status.py

      - name: Active contract legacy guard
        run: python -X utf8 -m pytest -q tests/test_release_hardening_active_contracts.py

      - name: Diff whitespace and generated-file guard
        if: always()
        run: |
          git diff --check
          git diff --exit-code

  finalization:
    needs: [manifest_sync, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
      JAZN_NETWORK_TIME_FIRST: "0"
      JAZN_NETWORK_TIME_IN_TURN: "0"
      JAZN_ALLOW_NETWORK: "0"
      JAZN_DICTIONARY_ALLOW_NETWORK: "0"
      JAZN_MODEL_ADAPTER: "null"
      JAZN_RELEASE_VERSION: ${{ needs.manifest_sync.outputs.runtime_version }}
      JAZN_FINALIZATION_DIR: release-finalization
    steps:
      - name: Checkout synchronized source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ needs.manifest_sync.outputs.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          mkdir -p "$RUNNER_TEMP/$JAZN_FINALIZATION_DIR"

      - name: Verify committed package manifest
        run: |
          python -X utf8 - <<'PY'
          import json
          import os
          from pathlib import Path
          from latka_jazn.tools.package_integrity import verify_package_integrity_manifest

          report_dir = Path(os.environ["RUNNER_TEMP"]) / os.environ["JAZN_FINALIZATION_DIR"]
          report = verify_package_integrity_manifest(Path.cwd())
          (report_dir / "manifest-verification.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          raise SystemExit(0 if report.get("ok") else 2)
          PY

      - name: Create clean release staging
        run: |
          python -X utf8 - <<'PY'
          import json
          import os
          from pathlib import Path
          from latka_jazn.tools.release_staging import create_release_staging

          temp = Path(os.environ["RUNNER_TEMP"])
          report_dir = temp / os.environ["JAZN_FINALIZATION_DIR"]
          destination = temp / f"jazn-{os.environ['JAZN_RELEASE_VERSION']}-release"
          report = create_release_staging(Path.cwd(), destination)
          (report_dir / "release-staging.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2, default=str) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False, indent=2, default=str))
          raise SystemExit(0 if report.get("ok") else 2)
          PY

      - name: Run doctor on verified release staging
        shell: bash
        run: |
          staging="$RUNNER_TEMP/jazn-${JAZN_RELEASE_VERSION}-release"
          report_dir="$RUNNER_TEMP/$JAZN_FINALIZATION_DIR"
          (
            cd "$staging"
            python -X utf8 run.py doctor --json
          ) > "$report_dir/doctor.json"
          cat "$report_dir/doctor.json"
          python -X utf8 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_dir = Path(os.environ["RUNNER_TEMP"]) / os.environ["JAZN_FINALIZATION_DIR"]
          payload = json.loads((report_dir / "doctor.json").read_text(encoding="utf-8"))
          required = {
              "installation_ok": payload.get("installation_ok"),
              "activation_prerequisites_ready": payload.get("activation_prerequisites_ready"),
              "release_metadata_current": payload.get("release_metadata_current"),
              "release_ready": payload.get("release_ready"),
          }
          print(required)
          if not all(required.values()):
              raise SystemExit(f"release doctor failed: {required}")
          PY

      - name: Package smoke system profile
        run: python -X utf8 run.py package-smoke --profile system --json | tee "$RUNNER_TEMP/$JAZN_FINALIZATION_DIR/package-smoke-system.json"

      - name: Package smoke release profile
        run: python -X utf8 run.py package-smoke --profile release --json | tee "$RUNNER_TEMP/$JAZN_FINALIZATION_DIR/package-smoke-release.json"

      - name: Targeted full runtime turn
        run: python -X utf8 -m pytest -q tests/test_v15101_runtime_full_turn.py | tee "$RUNNER_TEMP/$JAZN_FINALIZATION_DIR/full-turn.txt"

      - name: Version and manifest contract
        run: python -X utf8 -m pytest -q tests/test_single_source_version_manifest_contract.py | tee "$RUNNER_TEMP/$JAZN_FINALIZATION_DIR/version-manifest-contract.txt"

      - name: Clean checkout guard
        run: |
          git diff --check
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Upload finalization reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-finalization-reports-${{ needs.manifest_sync.outputs.runtime_version }}
          path: ${{ runner.temp }}/release-finalization/
          retention-days: 14
