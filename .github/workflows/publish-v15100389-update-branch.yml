name: Publish v15.1.0.3.89 current-line migration

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - update/v15.1.0.3.89-current-line-archive

permissions:
  contents: write

concurrency:
  group: publish-v15-1-0-3-89
  cancel-in-progress: false

jobs:
  publish:
    if: github.head_ref == 'automation/v15.1.0.3.89-migration-runner'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout verified technical payload
        uses: actions/checkout@v4
        with:
          ref: automation/v15.1.0.3.89-migration-runner
          path: payload-repo
          fetch-depth: 1

      - name: Checkout exact master source
        uses: actions/checkout@v4
        with:
          ref: 2e244d4a245440447102cca2ed3c7f947c8fd5c2
          path: target
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply SHA-verified migration
        shell: bash
        run: |
          set -euo pipefail
          python payload-repo/.automation/v15.1.0.3.89/publisher/apply_migration.py \
            --root target \
            --payload payload-repo/.automation/v15.1.0.3.89/publisher/payload
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: migrate active tree to v15.1.0.3.89"

      - name: Install project dependencies
        working-directory: target
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest prompt_toolkit py7zr

      - name: Synchronize canonical release metadata
        working-directory: target
        run: |
          python -X utf8 -m latka_jazn.tools.release_metadata_sync \
            --root . --write --base-branch master --json
          git add PACKAGE_INTEGRITY_MANIFEST.json SOURCE_PROVENANCE.json
          git diff --cached --check
          git commit -m "release: synchronize metadata for v15.1.0.3.89"

      - name: Validate complete final tree
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          python -X utf8 -m compileall -q latka_jazn tests tools main.py run.py
          python -X utf8 -m pytest -q -m "not live_model and not live_mcp"
          python -X utf8 -m latka_jazn.tools.release_metadata_sync --root . --check --json
          python -X utf8 -m latka_jazn.tools.current_line_archive_audit --root . --json
          python -X utf8 run.py doctor --json
          python -X utf8 run.py package-smoke --profile system --json
          python -X utf8 run.py package-smoke --profile release --json
          python -X utf8 tools/jazn_pack_generator.py self-test
          git diff --check
          test -z "$(git status --porcelain)"
          test ! -e .automation
          test ! -e .transport

      - name: Push two normal commits to target branch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:refs/heads/update/v15.1.0.3.89-current-line-archive \
            --force-with-lease=refs/heads/update/v15.1.0.3.89-current-line-archive:2e244d4a245440447102cca2ed3c7f947c8fd5c2
