name: Finalize v15.1.0.3.89 update branch

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - update/v15.1.0.3.89-current-line-archive

permissions:
  contents: write

concurrency:
  group: finalize-v15-1-0-3-89
  cancel-in-progress: false

jobs:
  finalize:
    if: github.head_ref == 'automation/v15.1.0.3.89-migration-runner'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact target branch
        uses: actions/checkout@v4
        with:
          ref: update/v15.1.0.3.89-current-line-archive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify expected target head and source boundaries
        shell: bash
        run: |
          set -euo pipefail
          expected=b3ca40890b396b320402681abfd5ff96eedf3cbc
          test "$(git rev-parse HEAD)" = "$expected"
          test ! -e .automation
          test ! -e .transport
          grep -F 'PACKAGE_VERSION = "v15.1.0.3.89"' latka_jazn/version.py
          grep -F 'tests/test_turn_atomicity.py' .github/workflows/release-hardening.yml
          grep -F 'tests/test_runtime_full_turn.py' .github/workflows/release-hardening.yml

      - name: Install complete test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest prompt_toolkit py7zr

      - name: Synchronize final canonical metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          python -X utf8 -m latka_jazn.tools.release_metadata_sync \
            --root . --write --base-branch master --json
          git add PACKAGE_INTEGRITY_MANIFEST.json SOURCE_PROVENANCE.json
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m "release: finalize metadata for v15.1.0.3.89"
          fi

      - name: Validate exact final branch tree
        shell: bash
        run: |
          set -euo pipefail
          python -X utf8 -m compileall -q latka_jazn tests tools main.py run.py
          python -X utf8 -m pytest -q -m "not live_model and not live_mcp"
          python -X utf8 -m latka_jazn.tools.release_metadata_sync --root . --check --base-branch master --json
          python -X utf8 -m latka_jazn.tools.current_line_archive_audit --root . --json
          python -X utf8 run.py doctor --json
          python -X utf8 run.py package-smoke --profile system --json
          python -X utf8 run.py package-smoke --profile release --json
          python -X utf8 tools/jazn_pack_generator.py self-test
          git diff --check
          test -z "$(git status --porcelain --untracked-files=all)"
          test ! -e .automation
          test ! -e .transport

      - name: Push final metadata commit
        shell: bash
        run: |
          set -euo pipefail
          expected=b3ca40890b396b320402681abfd5ff96eedf3cbc
          actual="$(git ls-remote origin refs/heads/update/v15.1.0.3.89-current-line-archive | awk '{print $1}')"
          test "$actual" = "$expected"
          git push origin HEAD:refs/heads/update/v15.1.0.3.89-current-line-archive
