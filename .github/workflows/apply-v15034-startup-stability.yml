name: Apply v15.0.3.4 startup stability

on:
  push:
    branches:
      - fix/v15.0.3.4-startup-stability
    paths:
      - .github/workflows/apply-v15034-startup-stability.yml

permissions:
  contents: write

concurrency:
  group: apply-v15034-startup-stability
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/v15.0.3.4-startup-stability
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Correct generated test string escapes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/scripts/apply_v15034_startup_stability.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '(tmp_path / "main.py").write_text("print(\'ok\')\\n", encoding="utf-8")':
                  '(tmp_path / "main.py").write_text("print(\'ok\')\\\\n", encoding="utf-8")',
              '(tmp_path / "run.py").write_text("raise SystemExit(2)\\n", encoding="utf-8")':
                  '(tmp_path / "run.py").write_text("raise SystemExit(2)\\\\n", encoding="utf-8")',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'expected one generator escape match: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Apply controlled source edits
        run: python -X utf8 .github/scripts/apply_v15034_startup_stability.py

      - name: Create local candidate commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/scripts/apply_v15034_startup_stability.py
          rm .github/workflows/apply-v15034-startup-stability.yml
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m "Apply v15.0.3.4 startup stability"

      - name: Compile committed tree
        run: python -X utf8 -m compileall -q latka_jazn tests main.py run.py

      - name: Run focused startup regressions
        run: python -X utf8 -m pytest -q tests/test_v15034_startup_stability.py

      - name: Run full non-live suite
        run: python -X utf8 -m pytest -q -m "not live_model and not live_mcp"

      - name: Doctor through main.py
        run: python -X utf8 main.py --doctor > /tmp/doctor-v15034.json

      - name: Package smoke through main.py
        run: python -X utf8 main.py --package-smoke --package-profile system > /tmp/package-smoke-v15034.json

      - name: Verify clean committed tree
        run: |
          git diff --check
          test -z "$(git status --short)"
          git show --stat --oneline --summary HEAD

      - name: Push verified candidate
        run: git push origin HEAD:fix/v15.0.3.4-startup-stability
